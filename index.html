<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品溯源系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .product-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }

        .status-pass {
            background: #d4edda;
            color: #155724;
        }

        .safety-level {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .safety-badge {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding: 12px 0;
            border-bottom: 1px dashed #f0f0f0;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 16px;
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #e0e0e0;
        }

        .timeline-time {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .timeline-status {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .conclusion {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
            border-left: 4px solid #ffc107;
            padding: 16px;
            border-radius: 0 8px 8px 0;
            margin-top: 16px;
        }

        .conclusion-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 8px;
        }

        .conclusion-text {
            font-size: 14px;
            color: #856404;
            line-height: 1.6;
        }

        .error-card {
            text-align: center;
            padding: 40px 24px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }

        .error-text {
            font-size: 14px;
            color: #888;
        }

        .expiry-countdown {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
        }

        .countdown-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .countdown-value {
            font-size: 20px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 12px;
            margin-top: 20px;
            opacity: 0.8;
        }

        .product-list {
            display: grid;
            gap: 16px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.15);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .product-id {
            font-size: 12px;
            color: #888;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .product-details {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .detail-item {
            font-size: 12px;
            color: #666;
        }

        .detail-item span {
            color: #888;
        }

        .qrcode-section {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .qrcode-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .qrcode-container {
            display: flex;
            justify-content: center;
        }

        .home-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
            transition: background 0.2s;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .list-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .list-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .list-subtitle {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍎 食品溯源系统</h1>
            <p>扫码查看食品详细信息</p>
        </div>

        <div id="content">
            <div class="card error-card">
                <div class="error-icon">🔍</div>
                <div class="error-title">加载中...</div>
                <div class="error-text">正在获取食品信息...</div>
            </div>
        </div>

        <div class="footer">
            <p>食品安全，人人有责</p>
        </div>
    </div>

    <script>
        const localProductsData = {
            "products": [
                {
                    "id": "APP202605001",
                    "name": "阳光苹果",
                    "batch": "2026-05-A01",
                    "origin": "重庆市巴南区智慧农业示范园",
                    "date": "2026-05-10",
                    "shelfLife": "30天",
                    "testResult": "合格",
                    "logistics": [
                        {"time": "2026-05-10 08:00", "status": "采摘完成"},
                        {"time": "2026-05-10 14:00", "status": "分拣包装"},
                        {"time": "2026-05-10 18:00", "status": "质量检测"},
                        {"time": "2026-05-11 09:00", "status": "冷链运输"},
                        {"time": "2026-05-12 15:00", "status": "超市上架"}
                    ],
                    "conclusion": "来源清晰，检测合格，可放心食用",
                    "safetyLevel": "A"
                },
                {
                    "id": "RIC202605002",
                    "name": "五常大米",
                    "batch": "2026-05-B02",
                    "origin": "黑龙江省哈尔滨市五常市",
                    "date": "2026-04-15",
                    "shelfLife": "180天",
                    "testResult": "合格",
                    "logistics": [
                        {"time": "2026-04-15 10:00", "status": "收割完成"},
                        {"time": "2026-04-16 08:00", "status": "脱粒加工"},
                        {"time": "2026-04-18 14:00", "status": "质量检测"},
                        {"time": "2026-04-20 09:00", "status": "物流运输"},
                        {"time": "2026-04-25 11:00", "status": "仓库入库"}
                    ],
                    "conclusion": "产地正宗，品质优良，符合国家食品安全标准",
                    "safetyLevel": "A"
                },
                {
                    "id": "MIL202605003",
                    "name": "鲜牛奶",
                    "batch": "2026-05-C03",
                    "origin": "内蒙古呼和浩特市蒙牛乳业基地",
                    "date": "2026-05-14",
                    "shelfLife": "7天",
                    "testResult": "合格",
                    "logistics": [
                        {"time": "2026-05-14 05:00", "status": "奶牛挤奶"},
                        {"time": "2026-05-14 06:00", "status": "巴氏杀菌"},
                        {"time": "2026-05-14 08:00", "status": "无菌灌装"},
                        {"time": "2026-05-14 10:00", "status": "冷链配送"},
                        {"time": "2026-05-14 16:00", "status": "超市上架"}
                    ],
                    "conclusion": "新鲜直达，全程冷链，品质保证",
                    "safetyLevel": "A+"
                },
                {
                    "id": "EGG202605004",
                    "name": "有机鸡蛋",
                    "batch": "2026-05-D04",
                    "origin": "山东省德州市生态养殖基地",
                    "date": "2026-05-13",
                    "shelfLife": "45天",
                    "testResult": "合格",
                    "logistics": [
                        {"time": "2026-05-13 07:00", "status": "鸡蛋收集"},
                        {"time": "2026-05-13 09:00", "status": "清洗消毒"},
                        {"time": "2026-05-13 11:00", "status": "质量检测"},
                        {"time": "2026-05-13 14:00", "status": "包装装箱"},
                        {"time": "2026-05-14 10:00", "status": "物流配送"}
                    ],
                    "conclusion": "有机养殖，无抗生素，安全放心",
                    "safetyLevel": "A"
                }
            ]
        };

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function calculateDaysRemaining(productionDate, shelfLife) {
            const production = new Date(productionDate);
            const days = parseInt(shelfLife);
            const expiry = new Date(production);
            expiry.setDate(expiry.getDate() + days);
            const today = new Date();
            const diffTime = expiry - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return Math.max(0, diffDays);
        }

        function getCurrentUrl() {
            const url = window.location.href;
            const index = url.indexOf('?');
            return index > 0 ? url.substring(0, index) : url;
        }

        function generateQRCode(text, elementId) {
            const canvas = document.createElement('canvas');
            canvas.id = elementId;
            canvas.width = 120;
            canvas.height = 120;
            drawQRCode(canvas, text);
            return canvas;
        }

        function drawQRCode(canvas, text) {
            const ctx = canvas.getContext('2d');
            const qrData = qrCodeEncode(text);
            const size = qrData.length;
            const cellSize = canvas.width / (size + 4);
            const margin = cellSize * 2;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#000000';
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (qrData[y][x]) {
                        ctx.fillRect(
                            margin + x * cellSize,
                            margin + y * cellSize,
                            cellSize,
                            cellSize
                        );
                    }
                }
            }
        }

        function qrCodeEncode(text) {
            const version = 1;
            const maskPattern = 0;
            const data = encodeData(text);
            const code = createQRCode(data, version, maskPattern);
            return code;
        }

        function encodeData(text) {
            let result = [];
            const mode = 0x4;
            const length = text.length;
            if (length < 16) {
                result.push((mode << 4) | length);
            } else {
                result.push((mode << 4) | 0);
                result.push(length);
            }
            for (let i = 0; i < text.length; i++) {
                const charCode = text.charCodeAt(i);
                if (charCode < 128) {
                    result.push(charCode);
                } else {
                    result.push((charCode >> 8) & 0xff);
                    result.push(charCode & 0xff);
                }
            }
            const totalBits = 208;
            const totalBytes = Math.ceil(totalBits / 8);
            while (result.length < totalBytes) {
                result.push(result.length % 2 === 0 ? 0xec : 0x11);
            }
            return result;
        }

        function createQRCode(data, version, maskPattern) {
            const size = version * 4 + 17;
            const code = Array(size).fill(null).map(() => Array(size).fill(false));

            for (let i = 0; i < 7; i++) {
                for (let j = 0; j < 7; j++) {
                    if (i < 7 && j < 7) code[i][j] = getPositionPattern(i, j);
                    if (i < 7 && j >= size - 7) code[i][j] = getPositionPattern(i, j - (size - 7));
                    if (i >= size - 7 && j < 7) code[i][j] = getPositionPattern(i - (size - 7), j);
                }
            }

            for (let i = 0; i < size; i++) {
                if (i % 2 === 0) code[6][i] = true;
                if (i % 2 === 1) code[i][6] = true;
            }

            let bitIndex = 0;
            for (let j = size - 1; j >= 0; j -= 2) {
                if (j === 6) j--;
                for (let i = size - 1; i >= 0; i--) {
                    for (let k = 0; k < 2; k++) {
                        const col = k === 0 ? j : j - 1;
                        if (col < 0) continue;
                        if (!code[i][col] && bitIndex < data.length * 8) {
                            const byteIndex = Math.floor(bitIndex / 8);
                            const bitInByte = 7 - (bitIndex % 8);
                            let bit = (data[byteIndex] >> bitInByte) & 1;
                            
                            if (shouldMask(i, col, maskPattern)) {
                                bit = bit ^ 1;
                            }
                            code[i][col] = bit === 1;
                            bitIndex++;
                        }
                    }
                }
            }

            return code;
        }

        function getPositionPattern(i, j) {
            if (i === 0 || i === 6 || j === 0 || j === 6) return true;
            if (i >= 2 && i <= 4 && j >= 2 && j <= 4) return true;
            return false;
        }

        function shouldMask(i, j, pattern) {
            switch (pattern) {
                case 0: return (i + j) % 2 === 0;
                case 1: return i % 2 === 0;
                case 2: return j % 3 === 0;
                case 3: return (i + j) % 3 === 0;
                default: return false;
            }
        }

        function renderProductList(products) {
            const currentUrl = getCurrentUrl();
            let html = `
                <div class="card">
                    <div class="list-header">
                        <div class="list-title">📋 食品列表</div>
                        <div class="list-subtitle">点击食品卡片或扫描二维码查看溯源信息</div>
                    </div>
                    <div class="product-list">
            `;

            products.forEach((product, index) => {
                const productUrl = `${currentUrl}?id=${product.id}`;
                
                html += `
                    <div class="product-card" onclick="window.location.href='${productUrl}'">
                        <div class="product-header">
                            <span class="product-title">${product.name}</span>
                            <span class="product-id">${product.id}</span>
                        </div>
                        <div class="product-details">
                            <div class="detail-item"><span>批次:</span> ${product.batch}</div>
                            <div class="detail-item"><span>产地:</span> ${product.origin}</div>
                        </div>
                        <div class="qrcode-section">
                            <div class="qrcode-title">扫码查看溯源信息</div>
                            <div class="qrcode-container" id="qrcode-container-${index}"></div>
                            <div style="font-size: 11px; color: #999; margin-top: 8px;">使用微信/支付宝/相机扫描</div>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            document.getElementById('content').innerHTML = html;

            products.forEach((product, index) => {
                const productUrl = `${currentUrl}?id=${product.id}`;
                const container = document.getElementById(`qrcode-container-${index}`);
                const canvas = generateQRCode(productUrl, `qrcode-${index}`);
                container.appendChild(canvas);
            });
        }

        function renderProductDetail(product) {
            const currentUrl = getCurrentUrl();
            const daysRemaining = calculateDaysRemaining(product.date, product.shelfLife);

            const timelineHtml = product.logistics.map(item => `
                <div class="timeline-item">
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-status">${item.status}</div>
                </div>
            `).join('');

            document.getElementById('content').innerHTML = `
                <a href="${currentUrl}" class="home-link">🏠 返回食品列表</a>
                <div class="card">
                    <div class="product-name">${product.name}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">产品编号</div>
                            <div class="info-value">${product.id}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">批次号</div>
                            <div class="info-value">${product.batch}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">产地</div>
                            <div class="info-value">${product.origin}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">生产日期</div>
                            <div class="info-value">${formatDate(product.date)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">保质期</div>
                            <div class="info-value">${product.shelfLife}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">检测结果</div>
                            <div class="info-value">${product.testResult}</div>
                        </div>
                    </div>

                    <div class="status-badge status-pass">✓ ${product.testResult}</div>
                    
                    <div class="safety-level">
                        <span class="info-label">安全等级</span>
                        <span class="safety-badge">${product.safetyLevel}</span>
                    </div>

                    <div class="expiry-countdown">
                        <div class="countdown-label">距离保质期还有</div>
                        <div class="countdown-value">${daysRemaining} 天</div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 16px; color: #333; font-size: 16px;">📦 物流轨迹</h3>
                    <div class="timeline">${timelineHtml}</div>
                </div>

                <div class="card">
                    <div class="conclusion">
                        <div class="conclusion-title">📝 溯源结论</div>
                        <div class="conclusion-text">${product.conclusion}</div>
                    </div>
                </div>
            `;
        }

        async function loadProductInfo() {
            const productId = getUrlParam('id');

            if (!productId) {
                try {
                    const response = await fetch('products.json');
                    const data = await response.json();
                    renderProductList(data.products);
                } catch (error) {
                    console.log('使用本地内嵌数据');
                    renderProductList(localProductsData.products);
                }
                return;
            }

            try {
                const response = await fetch('products.json');
                const data = await response.json();
                const product = data.products.find(p => p.id === productId);
                if (product) {
                    renderProductDetail(product);
                } else {
                    throw new Error('产品未找到');
                }
            } catch (error) {
                console.log('使用本地内嵌数据');
                const product = localProductsData.products.find(p => p.id === productId);
                if (product) {
                    renderProductDetail(product);
                } else {
                    document.getElementById('content').innerHTML = `
                        <div class="card error-card">
                            <div class="error-icon">❓</div>
                            <div class="error-title">未找到产品</div>
                            <div class="error-text">产品编号 ${productId} 不存在</div>
                        </div>
                    `;
                }
            }
        }

        window.onload = loadProductInfo;
    </script>
</body>
</html>
